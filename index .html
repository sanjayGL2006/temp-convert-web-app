<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter App</title>
    <style>
        /* Base reset and styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Mobile App Card Container */
        .app-container {
            background-color: #ffffff;
            width: 350px;
            border-radius: 24px;
            padding: 24px 24px 40px 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        /* Status Bar Mockup */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 24px;
        }

        .status-icons {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
        }

        /* Header */
        h1 {
            text-align: center;
            font-size: 18px;
            color: #000;
            margin-bottom: 32px;
        }

        /* Form Layout */
        .input-row {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        /* Labels */
        label {
            font-size: 14px;
            color: #8e8e93;
            margin-bottom: 8px;
        }

        /* Input Fields & Select Dropdown */
        input, select {
            border: none;
            border-bottom: 1px solid #e5e5ea;
            padding: 8px 0;
            font-size: 20px;
            color: #333;
            background-color: transparent;
            outline: none;
            width: 100%;
            -webkit-appearance: none; /* Removes default OS styling for dropdown */
            appearance: none;
        }

        /* Customizing the Select Dropdown to have an arrow */
        .select-wrapper {
            position: relative;
        }
        
        .select-wrapper::after {
            content: "▼";
            font-size: 12px;
            color: #666;
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        input:focus, select:focus {
            border-bottom-color: #007aff;
        }

        /* Result Section */
        .result-group {
            margin-bottom: 40px;
        }

        /* Action Button */
        .convert-btn {
            background-color: #007aff;
            color: #ffffff;
            border: none;
            border-radius: 12px;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .convert-btn:active {
            background-color: #005bb5;
        }

        /* Hide number input arrows */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="status-bar">
       
           
        </div>

        <h1>Temperature converter</h1>

        <div class="input-row">
            <div class="input-group">
                <label>Degrees</label>
                <input type="number" id="degrees" value="72">
            </div>
            
            <div class="input-group">
                <label>Type</label>
                <div class="select-wrapper">
                    <select id="type">
                        <option value="F">Fahrenheit</option>
                        <option value="C">Celsius</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="input-group result-group">
            <label>Result</label>
            <input type="text" id="result" value="22.2222 °C" readonly>
        </div>

        <button class="convert-btn" id="convert-btn">Convert</button>
    </div>

    <script>
        // Set up the event listener for the button
        document.getElementById('convert-btn').addEventListener('click', function() {
            // Get values from the UI
            const degreesInput = document.getElementById('degrees').value;
            const type = document.getElementById('type').value;
            const resultField = document.getElementById('result');

            // Convert input to a float number
            const degrees = parseFloat(degreesInput);

            // Validation: Ensure a number was entered
            if (isNaN(degrees)) {
                resultField.value = "Enter a number";
                return;
            }

            // Perform calculation based on the selected type
            if (type === 'F') {
                // Convert Fahrenheit to Celsius
                const celsius = (degrees - 32) * (5 / 9);
                // The screenshot shows 4 decimal places, so we format it accordingly
                resultField.value = celsius.toFixed(4) + ' °C';
            } else if (type === 'C') {
                // Convert Celsius to Fahrenheit
                const fahrenheit = (degrees * (9 / 5)) + 32;
                resultField.value = fahrenheit.toFixed(4) + ' °F';
            }
        });
    </script>
</body>
</html>
